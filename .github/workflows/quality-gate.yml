name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**
      - feature/**

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run crawler regression baseline
        run: node --test scripts/data/crawler/tests/regression-baseline.test.mjs

      - name: Run item import regression baseline
        working-directory: back
        run: mvn -Dtest=ItemImportRegressionTest test

      - name: Enable pnpm
        run: corepack enable

      - name: Install front dependencies
        working-directory: front
        run: pnpm install --frozen-lockfile

      - name: Install admin dependencies
        working-directory: data-query-app
        run: pnpm install --frozen-lockfile

      - name: Run CI-safe quality gate
        shell: bash
        run: |
          # Bash-first migration target. If P1 has not landed yet, fail with
          # an explicit migration message instead of silently using PowerShell.
          if [[ ! -f ./scripts/dev/quality-gate-ci.sh ]]; then
            echo "::error::Missing Bash target ./scripts/dev/quality-gate-ci.sh; see docs/plans/2026-05-14_wsl-bash-script-migration-plan.md P1."
            exit 1
          fi
          bash ./scripts/dev/quality-gate-ci.sh
