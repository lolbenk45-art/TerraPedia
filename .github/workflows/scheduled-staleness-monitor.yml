name: Scheduled Staleness Monitor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  staleness-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare artifact paths
        shell: bash
        run: |
          mkdir -p reports/domain reports/workflow

      - name: Domain acceptance freshness audit
        shell: bash
        run: |
          node ./scripts/data/workflow/domain-acceptance-freshness-audit.mjs --generated-at="${{ github.run_started_at }}" > reports/workflow/domain-acceptance-freshness-audit.json

      - name: Domain acceptance refresh plan
        shell: bash
        run: |
          node ./scripts/data/workflow/domain-acceptance-refresh-plan.mjs --generated-at="${{ github.run_started_at }}" --audit=reports/workflow/domain-acceptance-freshness-audit.json > reports/workflow/domain-acceptance-refresh-plan.json

      - name: B1 exemption compliance reports
        shell: bash
        run: |
          node ./scripts/data/audit/b1-exemption-compliance.mjs --generated-at="${{ github.run_started_at }}" --domain=support.recipe > reports/workflow/b1-support.recipe.json
          node ./scripts/data/audit/b1-exemption-compliance.mjs --generated-at="${{ github.run_started_at }}" --domain=support.shimmer > reports/workflow/b1-support.shimmer.json
          node ./scripts/data/audit/b1-exemption-compliance.mjs --generated-at="${{ github.run_started_at }}" --domain=support.item_group > reports/workflow/b1-support.item_group.json
          node ./scripts/data/audit/b1-exemption-compliance.mjs --generated-at="${{ github.run_started_at }}" --domain=support.town_npc_maintenance > reports/workflow/b1-support.town_npc_maintenance.json

      - name: Build issue body and staleness history
        id: issue_payload
        shell: bash
        run: |
          node ./scripts/data/workflow/create-staleness-alert-issue.mjs \
            --generated-at="${{ github.run_started_at }}" \
            --audit=reports/workflow/domain-acceptance-freshness-audit.json \
            --plan=reports/workflow/domain-acceptance-refresh-plan.json \
            --compliance-report=reports/workflow/b1-support.recipe.json,reports/workflow/b1-support.shimmer.json,reports/workflow/b1-support.item_group.json,reports/workflow/b1-support.town_npc_maintenance.json \
            --body-path=reports/domain/staleness-alert-issue.md \
            --history-path=reports/domain/staleness-history.jsonl > reports/workflow/staleness-alert-summary.json
          node --input-type=module -e '
            import { readFileSync, appendFileSync } from "node:fs";
            const summary = JSON.parse(readFileSync("reports/workflow/staleness-alert-summary.json", "utf8"));
            appendFileSync(process.env.GITHUB_OUTPUT, `should_create_issue=${summary.shouldCreateIssue}\n`);
            appendFileSync(process.env.GITHUB_OUTPUT, `issue_title=${summary.title}\n`);
          '

      - name: Create blocking staleness alert issue
        if: steps.issue_payload.outputs.should_create_issue == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          existing_number="$(gh issue list --label stale-evidence --state open --limit 1 --json number --jq '.[0].number // empty')"
          title="${{ steps.issue_payload.outputs.issue_title }}"
          if [[ -n "$existing_number" ]]; then
            echo "Open stale-evidence issue exists: #${existing_number}. Appending comment (title: ${title})."
            gh issue comment "$existing_number" --body-file reports/domain/staleness-alert-issue.md
          else
            gh issue create --title "$title" --body-file reports/domain/staleness-alert-issue.md --label monitoring --label stale-evidence
          fi

      - name: Upload staleness monitor artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-staleness-monitor
          path: |
            reports/workflow/domain-acceptance-freshness-audit.json
            reports/workflow/domain-acceptance-refresh-plan.json
            reports/workflow/b1-support.recipe.json
            reports/workflow/b1-support.shimmer.json
            reports/workflow/b1-support.item_group.json
            reports/workflow/b1-support.town_npc_maintenance.json
            reports/workflow/staleness-alert-summary.json
            reports/domain/staleness-alert-issue.md
            reports/domain/staleness-history.jsonl
