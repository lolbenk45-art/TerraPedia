    <radialGradient id="remainGoldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1078 208) rotate(90) scale(360)">
      <stop stop-color="#D6B263" stop-opacity="0.25"/>
