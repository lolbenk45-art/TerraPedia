    <linearGradient id="remainDarkPanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#18211B"/>
      <stop offset="1" stop-color="#31442B"/>
    </linearGradient>
    <linearGradient id="remainPaperPanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FBF3DF"/>
      <stop offset="1" stop-color="#EFE1C4"/>
