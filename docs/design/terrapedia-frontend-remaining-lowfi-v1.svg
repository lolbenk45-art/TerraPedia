      <rect x="20" y="20" width="6" height="6" rx="2" fill="#D6B263" opacity="0.14"/>
    </pattern>
    <pattern id="remainMiniWall" width="40" height="50" patternUnits="userSpaceOnUse">
      <rect x="4" y="4" width="32" height="32" rx="7" fill="#FFFFFF" fill-opacity="0.60" stroke="#D0C4AC"/>
