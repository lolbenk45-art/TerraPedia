    </radialGradient>
    <pattern id="remainPaperGrid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0 L0 0 0 36" stroke="#6E684E" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <pattern id="remainRuneGrid" width="46" height="46" patternUnits="userSpaceOnUse">
