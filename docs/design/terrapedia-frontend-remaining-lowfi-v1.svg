  <title>TerraPedia Frontend Remaining Public Pages Low Fidelity v1</title>
  <desc>Low-fidelity public frontend frames for category atlas, biome atlas, and public statistics overview.</desc>
  <defs>
    <linearGradient id="remainPaperBg" x1="720" y1="0" x2="720" y2="1280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F1DD"/>
      <stop offset="1" stop-color="#E6D7B9"/>
    </linearGradient>
    <linearGradient id="remainDarkBg" x1="0" y1="0" x2="1440" y2="1280" gradientUnits="userSpaceOnUse">
