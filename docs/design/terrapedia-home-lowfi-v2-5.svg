<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" fill="none">
  <title>TerraPedia Home Low Fidelity v2.5</title>
  <desc>Low-fidelity homepage hero wireframe. Game codex visual on the left, strong title/search entry on the right, moderate dramatic impact.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="1024" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09100B"/>
      <stop offset="0.45" stop-color="#172414"/>
      <stop offset="1" stop-color="#2F3621"/>
    </linearGradient>
    <radialGradient id="codexGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(410 445) rotate(90) scale(260)">
      <stop stop-color="#D6B263" stop-opacity="0.38"/>
      <stop offset="0.45" stop-color="#9AC26B" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#9AC26B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1130 166) rotate(90) scale(150)">
      <stop stop-color="#D6B263" stop-opacity="0.36"/>
      <stop offset="0.62" stop-color="#D6B263" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#D6B263" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="book" x1="0" y1="214" x2="0" y2="646" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF2D8"/>
      <stop offset="1" stop-color="#D6C194"/>
    </linearGradient>
    <linearGradient id="titleGold" x1="780" y1="278" x2="1312" y2="278" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7D6"/>
      <stop offset="1" stop-color="#D6B263"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#D6B263" flood-opacity="0.46"/>
    </filter>
    <pattern id="pixelGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1440" height="1024" rx="0" fill="#0B120C"/>
  <rect x="40" y="40" width="1360" height="944" rx="24" fill="url(#bg)" stroke="#D5CBB8" stroke-opacity="0.42"/>

  <g id="background-world">
    <rect x="40" y="40" width="1360" height="944" rx="24" fill="url(#moonGlow)"/>
    <circle cx="390" cy="466" r="360" fill="#D6B263" opacity="0.08"/>
    <circle cx="1060" cy="190" r="230" fill="#78A89F" opacity="0.12"/>
    <path d="M40 670 L156 445 L260 514 L412 330 L560 540 L724 410 L878 670 Z" fill="#283820" opacity="0.92"/>
    <path d="M1400 670 L1260 454 L1142 518 L1010 350 L870 540 L704 418 L560 670 Z" fill="#182519" opacity="0.96"/>
    <rect x="40" y="755" width="1360" height="229" fill="#4A3323"/>
    <rect x="40" y="755" width="1360" height="18" fill="#5E7A40"/>
    <rect x="40" y="773" width="1360" height="24" fill="#34472B"/>
    <rect x="40" y="797" width="1360" height="38" fill="#846642"/>
    <rect x="40" y="818" width="1360" height="166" fill="url(#pixelGrid)" opacity="0.72"/>
  </g>

