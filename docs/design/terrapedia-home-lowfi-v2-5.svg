        <rect x="154" y="590" width="136" height="96" rx="10" fill="#FBF8F0" fill-opacity="0.13" stroke="#D6B263" stroke-opacity="0.4"/>
        <rect x="168" y="604" width="30" height="30" rx="5" fill="#78A89F"/>
        <rect x="168" y="648" width="94" height="8" rx="4" fill="#F3EEDC" opacity="0.72"/>
        <rect x="168" y="664" width="72" height="8" rx="4" fill="#F3EEDC" opacity="0.72"/>
      </g>
      <g transform="rotate(-6 604 640)">
        <rect x="536" y="592" width="136" height="96" rx="10" fill="#FBF8F0" fill-opacity="0.13" stroke="#D6B263" stroke-opacity="0.4"/>
        <rect x="550" y="606" width="30" height="30" rx="5" fill="#83F9B8"/>
        <rect x="550" y="650" width="94" height="8" rx="4" fill="#F3EEDC" opacity="0.72"/>
        <rect x="550" y="666" width="64" height="8" rx="4" fill="#F3EEDC" opacity="0.72"/>
      </g>
    </g>

