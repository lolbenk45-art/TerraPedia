      <rect x="346" y="348" width="126" height="126" rx="16" fill="#9AC26B" filter="url(#glow)"/>
      <rect x="376" y="378" width="126" height="126" rx="16" fill="#D6B263" opacity="0.86"/>
      <rect x="322" y="390" width="126" height="126" rx="16" fill="#78A89F" opacity="0.76"/>
