      <rect x="1070" y="662" width="128" height="35" rx="8" fill="#18211B" fill-opacity="0.72" stroke="#D6B263" stroke-opacity="0.34"/>
      <rect x="1215" y="662" width="128" height="35" rx="8" fill="#18211B" fill-opacity="0.72" stroke="#D6B263" stroke-opacity="0.34"/>
