    <rect x="1122" y="70" width="58" height="9" rx="4.5" fill="#F3EEDC" opacity="0.58"/>
    <rect x="1204" y="70" width="58" height="9" rx="4.5" fill="#F3EEDC" opacity="0.58"/>
