      <rect x="246" y="232" width="328" height="396" rx="14" stroke="#5F4E32" stroke-opacity="0.34"/>
      <rect x="405" y="214" width="10" height="432" rx="5" fill="#5F4E32" opacity="0.22"/>
      <rect x="334" y="273" width="152" height="24" rx="12" fill="#5C4329" opacity="0.78"/>
