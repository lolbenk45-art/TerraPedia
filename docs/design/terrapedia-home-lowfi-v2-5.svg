    <rect x="124" y="944" width="170" height="7" rx="3.5" fill="#F3EEDC" opacity="0.6"/>
    <rect x="416" y="900" width="288" height="64" rx="10" fill="#09100B" fill-opacity="0.64" stroke="#D6B263" stroke-opacity="0.26"/>
    <rect x="436" y="916" width="58" height="17" rx="8.5" fill="#D6B263"/>
    <rect x="436" y="944" width="170" height="7" rx="3.5" fill="#F3EEDC" opacity="0.6"/>
    <rect x="728" y="900" width="288" height="64" rx="10" fill="#09100B" fill-opacity="0.64" stroke="#D6B263" stroke-opacity="0.26"/>
    <rect x="748" y="916" width="58" height="17" rx="8.5" fill="#D6B263"/>
    <rect x="748" y="944" width="170" height="7" rx="3.5" fill="#F3EEDC" opacity="0.6"/>
    <rect x="1040" y="900" width="288" height="64" rx="10" fill="#09100B" fill-opacity="0.64" stroke="#D6B263" stroke-opacity="0.26"/>
    <rect x="1060" y="916" width="58" height="17" rx="8.5" fill="#D6B263"/>
    <rect x="1060" y="944" width="170" height="7" rx="3.5" fill="#F3EEDC" opacity="0.6"/>
